<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Firebase Connection Test — Mie Ayam Lariska</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 24px;
      max-width: 640px;
      margin: 0 auto;
      background: #FFF1D6;
      color: #1F1F1F;
    }
    h1 { color: #C40000; margin-bottom: 4px; }
    .subtitle { color: #666; margin-bottom: 24px; }
    .test-group { margin-bottom: 16px; }
    .test-label { font-weight: 600; margin-bottom: 4px; }
    .status {
      padding: 12px 16px;
      border-radius: 6px;
      font-size: 14px;
    }
    .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
    .error   { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    .pending { background: #fff3cd; color: #856404; border: 1px solid #ffeeba; }
    pre {
      background: #1F1F1F;
      color: #e0e0e0;
      padding: 16px;
      border-radius: 6px;
      overflow-x: auto;
      font-size: 13px;
      line-height: 1.5;
      max-height: 400px;
      overflow-y: auto;
    }
    .summary {
      margin-top: 24px;
      padding: 16px;
      border-radius: 6px;
      font-weight: 600;
      font-size: 16px;
      text-align: center;
    }
    .summary.pass { background: #C40000; color: #FFF1D6; }
    .summary.fail { background: #721c24; color: #fff; }
  </style>
</head>
<body>

  <h1>Firebase Connection Test</h1>
  <p class="subtitle">Mie Ayam Lariska — Realtime Database</p>

  <div class="test-group">
    <div class="test-label">1. Connection</div>
    <div id="test-connection" class="status pending">Connecting...</div>
  </div>

  <div class="test-group">
    <div class="test-label">2. Read Stock Data</div>
    <div id="test-read" class="status pending">Pending...</div>
  </div>

  <div class="test-group">
    <div class="test-label">3. Write Stock Data</div>
    <div id="test-write" class="status pending">Pending...</div>
  </div>

  <div class="test-group">
    <div class="test-label">4. Seed Initial Data</div>
    <div id="test-seed" class="status pending">Pending...</div>
  </div>

  <div class="test-group">
    <div class="test-label">Stock Data from Firebase:</div>
    <pre id="stock-data">Loading...</pre>
  </div>

  <div id="summary" class="summary pending">Running tests...</div>

  <!-- Firebase compat SDK via CDN -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
  <script src="firebase-config.js"></script>

  <script>
    (function () {
      var results = { connection: false, read: false, write: false, seed: false };

      function setTest(id, state, message) {
        var el = document.getElementById(id);
        el.className = 'status ' + state;
        el.textContent = message;
      }

      function updateSummary() {
        var passed = Object.values(results).filter(Boolean).length;
        var total = Object.keys(results).length;
        var el = document.getElementById('summary');
        if (passed === total) {
          el.className = 'summary pass';
          el.textContent = 'ALL TESTS PASSED (' + passed + '/' + total + ')';
        } else {
          el.className = 'summary fail';
          el.textContent = passed + '/' + total + ' tests passed';
        }
      }

      var svc = window.FirebaseService;
      if (!svc) {
        setTest('test-connection', 'error', 'FAILED: FirebaseService not loaded. Check console.');
        updateSummary();
        return;
      }

      // --- Test 1: Connection ---
      var connRef = svc.db.ref('.info/connected');
      connRef.on('value', function (snap) {
        if (snap.val() === true) {
          results.connection = true;
          setTest('test-connection', 'success', 'PASSED — Connected to Firebase Realtime Database');
        } else {
          results.connection = false;
          setTest('test-connection', 'error', 'FAILED — Not connected');
        }
        updateSummary();
      });

      // --- Test 2: Read stock data ---
      svc.getAllStock()
        .then(function (data) {
          var count = Object.keys(data).length;
          if (count >= 0) {
            results.read = true;
            setTest('test-read', 'success', 'PASSED — Retrieved ' + count + ' stock entries');
          } else {
            results.read = false;
            setTest('test-read', 'error', 'FAILED — No data returned');
          }
          document.getElementById('stock-data').textContent = JSON.stringify(data, null, 2);
          updateSummary();
        })
        .catch(function (err) {
          results.read = false;
          setTest('test-read', 'error', 'FAILED — ' + err.message);
          updateSummary();
        });

      // --- Test 3: Write stock data (temp entry, then cleanup) ---
      var testId = '_test_' + Date.now();
      svc.updateStock(testId, 'available')
        .then(function () {
          results.write = true;
          setTest('test-write', 'success', 'PASSED — Temp entry created (cleaned up)');
          return svc.stockRef.child(testId).remove();
        })
        .catch(function (err) {
          results.write = false;
          setTest('test-write', 'error', 'FAILED — ' + err.message);
          updateSummary();
        });

      // --- Test 4: Seed initial stock data ---
      svc.seedInitialStock()
        .then(function () {
          results.seed = true;
          setTest('test-seed', 'success', 'PASSED — Missing entries seeded successfully');
          return svc.getAllStock();
        })
        .then(function (data) {
          document.getElementById('stock-data').textContent = JSON.stringify(data, null, 2);
          updateSummary();
        })
        .catch(function (err) {
          results.seed = false;
          setTest('test-seed', 'error', 'FAILED — ' + err.message);
          updateSummary();
        });
    })();
  </script>

</body>
</html>
