<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Admin — Mie Ayam Lariska</title>
  <meta name="description" content="Halaman login admin Mie Ayam Lariska">
  
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/admin.css">
</head>
<body>
  <div class="admin-login">
    <div class="admin-login__card">
      <div class="admin-login__header">
        <h1 class="admin-login__brand">Mie Ayam Lariska</h1>
        <h2 class="admin-login__title">Admin Login</h2>
      </div>
      
      <form id="login-form" novalidate>
        <div id="error-message" class="error-message" role="alert" aria-live="polite"></div>
        
        <div class="form-group">
          <label for="username" class="form-label">Username</label>
          <input 
            type="text" 
            id="username" 
            name="username"
            class="form-input"
            placeholder="Masukkan username"
            autocomplete="username"
            required
          >
        </div>
        
        <div class="form-group">
          <label for="password" class="form-label">Password</label>
          <input 
            type="password" 
            id="password" 
            name="password"
            class="form-input"
            placeholder="Masukkan password"
            autocomplete="current-password"
            required
          >
        </div>
        
        <button type="submit" id="login-button" class="login-button">
          Masuk
        </button>
      </form>
    </div>
  </div>

  <script src="../js/admin-auth.js"></script>
</body>
</html>
